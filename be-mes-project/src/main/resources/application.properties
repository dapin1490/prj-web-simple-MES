spring.application.name=be-mes-project

# DataSource Configuration (H2 default, MySQL configurable via environment variables)
spring.datasource.url=${MES_DB_URL:jdbc:h2:mem:mesdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${MES_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${MES_DB_USERNAME:sa}
spring.datasource.password=${MES_DB_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# API JSON contract: use snake_case field names on wire.
spring.jackson.property-naming-strategy=SNAKE_CASE

# H2 Console (Development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CSV bootstrap seed
mes.seed.csv.enabled=true

# MES Simulation Configuration
# Scheduler interval for data replay (milliseconds)
mes.simulation.interval-ms=1000
# Classpath CSV path used by scheduler simulation.
mes.simulation.source-path=data/ProductionLogs.csv
